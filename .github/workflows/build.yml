name: Build & Release

# Как создать релиз:
#   git tag v1.0.0
#   git push origin v1.0.0
# CI соберёт Linux + Windows билды и опубликует GitHub Release
# с ZIP-архивами (konkurent-linux.zip, konkurent-windows.zip)
# и автоматическими release notes из коммитов.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk ghostscript

      - name: Setup venv & install deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt pyinstaller

      - name: Build
        run: ./build_portable.sh

      - name: Pack
        run: |
          cd dist
          zip -r ../konkurent-linux.zip конкурент/

      - uses: actions/upload-artifact@v4
        with:
          name: konkurent-linux-zip
          path: konkurent-linux.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ghostscript
        run: choco install ghostscript --no-progress

      - name: Setup venv & install deps
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -r requirements.txt pyinstaller

      - name: Build
        run: .\build_portable.bat

      - name: Pack
        run: |
          cd dist
          Compress-Archive -Path kongkurent -DestinationPath ..\konkurent-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: konkurent-windows-zip
          path: konkurent-windows.zip

  release:
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: konkurent-*.zip
          generate_release_notes: true
